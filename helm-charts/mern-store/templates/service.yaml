{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: mern-backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: mern-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 5000
      protocol: TCP
      name: http
---
{{- end }}

{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: mern-frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: mern-frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      nodePort: {{ .Values.frontend.service.nodePort }}
      protocol: TCP
      name: http
---
{{- end }}

{{- if .Values.mongo.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  labels:
    app: mongo
spec:
  type: {{ .Values.mongo.service.type }}
  selector:
    app: mongo
  ports:
    - port: {{ .Values.mongo.service.port }}
      targetPort: 27017
      protocol: TCP
      name: mongo
{{- end }}