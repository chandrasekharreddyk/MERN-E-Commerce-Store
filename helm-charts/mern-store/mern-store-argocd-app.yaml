apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chandrasekharreddyk/MERN-E-Commerce-Store.git
    targetRevision: main
    path: helm-charts/mern-store
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mern-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true